    <script>

    <script>
        function locationObj(latlon) {
            // this is a custom object for storing all the properties of a particular marker location.  It contains all information from a single row in the spreadsheet.
            this.startDate = [];
            this.endDate = [];
            this.headLine = [];
            this.text = [];
            this.media = [];
            this.mediaThumbnail = [];
            this.latLon = latlon; // [1x2] array of floats
        }

        function myCallback(spreadsheetdata) {
            // this is the JSON callback which is executed to return the google spreadsheet values.  They are returned in a Javascript object, spreadsheetdata.  We format the relevant data for the map markers into an array of locationObj, defined above.  This array is then assigned to a window variable so it can be passed to the initialize function below.
            if (spreadsheetdata) {
                try {
                    var coln = parseInt(spreadsheetdata.feed.gs$colCount.$t);
                    var rown = parseInt(spreadsheetdata.feed.gs$rowCount.$t);

                    // find the indexes for the columns we want to process
                    for (var i = 0; i < coln; i++) {
                        var auxentry = spreadsheetdata.feed.entry[i];
                        switch (auxentry.content.$t) {
                            case "Start Date":
                                var startDateInd = i + 1;
                                break;
                            case "End Date":
                                var endDateInd = i + 1;
                                break;
                            case "Headline":
                                var headLineInd = i + 1;
                                break;
                            case "Text":
                                var textInd = i + 1;
                                break;
                            case "Media":
                                var mediaInd = i + 1;
                                break;
                            case "Media Thumbnail":
                                var mediaThumbnailInd = i + 1;
                                break;
                            case "LatLon":
                                var latLonInd = i + 1;
                                break;

                        }//end switch
                    }//end for

                    // some intermediate arrays for gathering the cell data for each column
                    var startDate = new Array();
                    var endDate = new Array();
                    var headLine = new Array();
                    var text = new Array();
                    var media = new Array();
                    var mediaThumbnail = new Array();
                    var latLon = new Array();

                    // we fill the intermediate arrays w/ the cell content and the row.  spreadsheet data just has an array of cell objects which contain data (empty cells don't exist in the array), so we must know the row/col of each cell to determine its original location in spreadsheet.
                    // to understand this part of the code, you need to do the following,
                    // inspect the spreadsheet obj in your browser's console w/ the following,
                    // console.log(spreadsheetdata)
                    for (var i = 0; i < spreadsheetdata.feed.entry.length; i++) {
                        var auxentry = spreadsheetdata.feed.entry[i];
                        if (parseInt(auxentry.gs$cell.row) > 1) {

                            // .push method just adds a new element to the end of the receiver array
                            switch (parseInt(auxentry.gs$cell.col)) {
                                case startDateInd:
                                    startDate.push([auxentry.gs$cell.$t, auxentry.gs$cell.row]);
                                    break;
                                case endDateInd:
                                    endDate.push([auxentry.gs$cell.$t, auxentry.gs$cell.row]);
                                    break;
                                case headLineInd:
                                    headLine.push([auxentry.gs$cell.$t, auxentry.gs$cell.row]);
                                    break;
                                case textInd:
                                    text.push([auxentry.gs$cell.$t, auxentry.gs$cell.row]);
                                    break;
                                case mediaInd:
                                    media.push([auxentry.gs$cell.$t, auxentry.gs$cell.row]);
                                    break;
                                case mediaThumbnailInd:
                                    mediaThumbnail.push([auxentry.gs$cell.$t, auxentry.gs$cell.row]);
                                    break;
                                case latLonInd:
                                    latLon.push([auxentry.gs$cell.$t, auxentry.gs$cell.row]);
                                    break;
                            }//end switch
                        }//end if
                    }//end for

                    // create the locationObj array
                    var auxlocations = new Array();
                    var inds = new Array();
                    for (var i = 0; i < latLon.length; i++) {
                        inds[i] = latLon[i][1];
                        latLon[i][0] = latLon[i][0].split(',');
                        latLon[i][0][0] = parseFloat(latLon[i][0][0]);
                        latLon[i][0][1] = parseFloat(latLon[i][0][1]);
                        auxlocations[i] = new locationObj(latLon[i][0]);
                    }

                    var auxind;
                    //startDate
                    for (var i = 0; i < startDate.length; i++) {
                        if (inds.indexOf(startDate[i][1]) > -1) {
                            auxind = inds.indexOf(startDate[i][1]);
                            auxlocations[auxind].startDate = startDate[i][0];
                        }
                    }
                    //endDate
                    var preEndDate = " - "; // prefix for end date when it exists
                    for (var i = 0; i < endDate.length; i++) {
                        if (inds.indexOf(endDate[i][1]) > -1) {
                            auxind = inds.indexOf(endDate[i][1]);
                            auxlocations[auxind].endDate = preEndDate.concat(endDate[i][0]);
                        }
                    }
                    //headLine
                    for (var i = 0; i < headLine.length; i++) {
                        if (inds.indexOf(headLine[i][1]) > -1) {
                            auxind = inds.indexOf(headLine[i][1]);
                            auxlocations[auxind].headLine = headLine[i][0];
                        }
                    }
                    //text
                    for (var i = 0; i < text.length; i++) {
                        if (inds.indexOf(text[i][1]) > -1) {
                            auxind = inds.indexOf(text[i][1]);
                            auxlocations[auxind].text = text[i][0];
                        }
                    }
                    //media
                    for (var i = 0; i < media.length; i++) {
                        if (inds.indexOf(media[i][1]) > -1) {
                            auxind = inds.indexOf(media[i][1]);
                            auxlocations[auxind].media = media[i][0];
                        }
                    }
                    //mediaThumbnail
                    for (var i = 0; i < mediaThumbnail.length; i++) {
                        if (inds.indexOf(mediaThumbnail[i][1]) > -1) {
                            auxind = inds.indexOf(mediaThumbnail[i][1]);
                            auxlocations[auxind].mediaThumbnail = mediaThumbnail[i][0];
                        }
                    }
                    // store the locationObj array into the window data.
                    window.locations = auxlocations;
                    window.isData = true;
                } catch (err) {
                    window.isData = false;
                }
            } else {
                window.isData = false;
            }
        }
    </script>

    <script>
        var map;
        var mapOptions;
        var mapLatLon;

        
        function initialize() {
            // Function that is called below, which creates the map view and markers.
            if (!window.isData) {
                console.log("exiting due to no data")
                return
            }

            var mapZoom = 2;                            // MAP ZOOM
            mapLatLon = new Array(41.4, -102.7);    // MAP CENTER HERE
            mapOptions = {
                zoom: mapZoom,
                center: new google.maps.LatLng(mapLatLon[0], mapLatLon[1]),
                mapTypeId: google.maps.MapTypeId.ROADMAP,      // MAP TYPE: HYBRID, ROADMAP, SATELLITE, TERRAIN
                minZoom: 2
            };
            map = new google.maps.Map(document.getElementById('map-canvas'),
                                                          mapOptions);

            // Create a simple 2d array of our content
            // simple 2d array [
            //                  [(html text), lat, lon],
            //                  [(html text), lat, lon],
            //                  ........
            //                  ]
            // (html text) this where we can do all of our formating for whats displayed inside the marker pop-out bubble.  I'm pretty sure we can put just about anything we want in here.  Pictures, links, charts, graphs, movies.......etc
            var locations = new Array();
            for (var i = 0; i < window.locations.length; i++) {
                locations[i] = new Array();
                var auxLoc = window.locations[i];

                tempImg = new Image();
                tempImg.src = auxLoc.media;
                // (html text) is stiched together right here, using our custom locationsObj to provide the content.
                var someContent = '<div id="content">' +
                                    '<div id="bodyContent"><p>' + auxLoc.text + '</p>' +
                                    '<IMG SRC=' + auxLoc.media + ' ALT="missing" WIDTH=70% class="float-middle">' +
                                    '</div>' +
                                    '</div>';


                locations[i][0] = someContent;
                // assign lat and lon here
                locations[i][1] = window.locations[i].latLon[0];
                locations[i][2] = window.locations[i].latLon[1];
                //title
                locations[i][3] = auxLoc.headLine + ', ' + auxLoc.startDate;

            }

            // EXAMPLE (HTML TEXT).
            //                        var someContent = '<div id="content">'+
            //                        '<div id="siteNotice">'+
            //                        '</div>'+
            //                        '<h1 id="firstHeading" class="firstHeading">Camp Beale</h1>'+
            //                        '<div id="bodyContent">'+
            //                        '<p><b>Camp Beale</b>, did some stuff here, blah blah.</p>'+
            //                        '<IMG SRC="UXOLab_dynamic_display.png" ALT="some text" WIDTH=64 HEIGHT=64>'+
            //                        '<p>A Link to something: Camp Beale, <a href="http://www.btgeophysics.com/Research">'+
            //                        'Do Some research</a>.</p>'+
            //                        '</div>'+
            //                        '</div>';

            // create the info windows and markers here
            //var infowindow = new google.maps.InfoWindow();
            var marker, i;
            for (i = 0; i < locations.length; i++) {
                marker = new google.maps.Marker({
                    position: new google.maps.LatLng(locations[i][1], locations[i][2]),
                    map: map
                });

                //marker.setAnimation(google.maps.Animation.BOUNCE); //not a fan :)


                google.maps.event.addListener(marker, 'click', (function (marker, i) {
                    return function () {

                        $("#DialogText").html(locations[i][0]);
                        $("#dialog").dialog("option", "title", locations[i][3]);
                        $("#dialog").dialog("open");

                        //marker.setAnimation(google.maps.Animation.DROP);                       infowindow.setContent(locations[i][0]);
                        //                           infowindow.close;
                        //                           infowindow.open(map, marker);
                    }
                })(marker, i));

                //google.maps.event.addListener(infowindow, 'closeclick', (function(marker, i) {
                //                                                return function() {
                //                                                map.setZoom(mapZoom);
                //                                                map.setCenter(new google.maps.LatLng(mapLatLon[0], mapLatLon[1]));
                //                                                }
                //                                                })(marker, i)
                //                              );
            } //end for
        } //end initialize
        function centerMap() {
            google.maps.event.trigger(map, "resize");
            map.setCenter(new google.maps.LatLng(mapLatLon[0], mapLatLon[1]));
        }
    </script>
