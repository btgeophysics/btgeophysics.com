<script>
var mapInitialized = false;
var baseURL = {{ .Site.BaseURL }};

// Project data from Hugo data file
var projectData = {{ $.Site.Data.projects | jsonify | safeJS }};

document.addEventListener('DOMContentLoaded', function() {
    var mapModal = document.getElementById('projectMapModal');
    if (mapModal) {
        mapModal.addEventListener('shown.bs.modal', function() {
            if (!mapInitialized) {
                initProjectMap();
                mapInitialized = true;
            } else {
                google.maps.event.trigger(window.projectMap, 'resize');
            }
        });
    }
});

function offsetOverlapping(data) {
    var groups = {};
    data.forEach(function(p) {
        var key = p.lat.toFixed(2) + ',' + p.lon.toFixed(2);
        if (!groups[key]) groups[key] = [];
        groups[key].push(p);
    });
    Object.keys(groups).forEach(function(key) {
        var items = groups[key];
        if (items.length > 1) {
            var radius = 0.04;
            items.forEach(function(p, i) {
                var angle = (2 * Math.PI * i) / items.length;
                p.lat += radius * Math.cos(angle);
                p.lon += radius * Math.sin(angle);
            });
        }
    });
    return data;
}

function initProjectMap() {
    var mapOptions = {
        zoom: 2,
        center: { lat: 41.4, lng: -102.7 },
        mapTypeId: 'roadmap',
        minZoom: 2
    };

    window.projectMap = new google.maps.Map(
        document.getElementById('map-canvas'),
        mapOptions
    );

    var infoWindow = new google.maps.InfoWindow();

    projectData = offsetOverlapping(projectData);

    projectData.forEach(function(project) {
        var marker = new google.maps.Marker({
            position: { lat: project.lat, lng: project.lon },
            map: window.projectMap,
            title: project.headline
        });

        var dateStr = project.startDate;
        if (project.endDate) {
            dateStr += ' - ' + project.endDate;
        }

        var content = '<div style="max-width:400px;color:#333;">' +
            '<h6 style="margin:0 0 8px;color:#333;">' + project.headline + ' (' + dateStr + ')</h6>' +
            '<p style="font-size:14px;margin:0 0 8px;color:#333;">' + project.text + '</p>';
        if (project.media) {
            var mediaURL = baseURL.replace(/\/$/, '') + '/' + project.media;
            content += '<img src="' + mediaURL + '" alt="' + project.headline + '" style="width:100%;max-width:300px;">';
        }
        content += '</div>';

        marker.addListener('click', function() {
            infoWindow.setContent(content);
            infoWindow.open(window.projectMap, marker);
        });
    });
}
</script>
<script src="https://maps.googleapis.com/maps/api/js?key={{ .Site.Params.googleMapsKey }}" async defer></script>
