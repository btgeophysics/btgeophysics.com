<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ .Site.Params.description }}">
    <title>{{ .Site.Title }}</title>

    <link href="/favicon.ico" rel="shortcut icon">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- Custom CSS -->
    {{ $style := resources.Get "scss/main.scss" | toCSS | minify }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">

    <!-- Font Awesome -->
    <script src="{{ .Site.Params.fontAwesomeKit }}" crossorigin="anonymous"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet">
</head>
<body id="page-top" data-bs-spy="scroll" data-bs-target=".navbar">
    {{ block "main" . }}{{ end }}

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    {{ block "scripts" . }}{{ end }}

    <script>
    // Navbar collapse on scroll
    window.addEventListener('scroll', function() {
        const navbar = document.querySelector('.navbar');
        const navlogo = document.getElementById('navlogo');
        if (window.scrollY > 50) {
            navbar.classList.add('top-nav-collapse');
            navlogo.classList.remove('d-none');
        } else {
            navbar.classList.remove('top-nav-collapse');
            navlogo.classList.add('d-none');
        }
    });

    // Smooth scrolling for anchor links
    document.querySelectorAll('a.page-scroll').forEach(function(anchor) {
        anchor.addEventListener('click', function(e) {
            var href = this.getAttribute('href');
            if (href.startsWith('#')) {
                e.preventDefault();
                var target = document.querySelector(href);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
                // Collapse mobile nav if open
                var navCollapse = document.querySelector('.navbar-collapse.show');
                if (navCollapse) {
                    var bsCollapse = bootstrap.Collapse.getInstance(navCollapse);
                    if (bsCollapse) bsCollapse.hide();
                }
            }
        });
    });
    </script>
</body>
</html>
